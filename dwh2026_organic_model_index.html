function Badge({ children, color, bg }) {
  return <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 10, background: bg, color, whiteSpace: "nowrap" }}>{children}</span>;
}

function ScopeDot({ scope }) {
  const c = SCOPE_COLORS[scope];
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 11, fontWeight: 600, color: c.text }}>
    <span style={{ width: 8, height: 8, borderRadius: "50%", background: c.dot, display: "inline-block" }} />
    {scope}
  </span>;
}

function Card({ children, style }) {
  return <div style={{ background: "var(--color-bg-secondary, #f8fafc)", border: "1px solid var(--color-border-secondary, #e2e8f0)", borderRadius: 10, padding: 16, marginBottom: 12, ...style }}>{children}</div>;
}

function StatCard({ label, value, sub }) {
  return <div style={{ textAlign: "center", padding: "12px 8px" }}>
    <div style={{ fontSize: 28, fontWeight: 800, color: "var(--color-text-primary, #0f172a)" }}>{value}</div>
    <div style={{ fontSize: 12, fontWeight: 600, color: "var(--color-text-secondary, #64748b)", marginTop: 2 }}>{label}</div>
    {sub && <div style={{ fontSize: 11, color: "var(--color-text-tertiary, #94a3b8)", marginTop: 2 }}>{sub}</div>}
  </div>;
}

                {g.models.map(m => (

                    <code style={{ fontWeight: 600, minWidth: 280, fontSize: 10 }}>{m.name}</code>
                    <Badge color={m.mat.includes("view") || m.mat === "no config" ? "#d97706" : "#059669"} bg={m.mat.includes("view") || m.mat === "no config" ? "#fffbeb" : "#ecfdf5"}>{m.mat}</Badge>
                    <span style={{ color: "var(--color-text-secondary, #64748b)", fontSize: 10 }}>{m.desc}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </Card>
        <Card style={{ background: "#f1f5f920" }}>
          <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 4 }}>META Layer (1 model)</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 8px", borderRadius: 5, background: "#f1f5f9", fontSize: 11 }}>
            <ScopeDot scope="shared" />
            <code style={{ fontWeight: 600, minWidth: 280, fontSize: 10 }}>meta_attribution_windows</code>
            <Badge color="#d97706" bg="#fffbeb">no config</Badge>
            <span style={{ color: "var(--color-text-secondary, #64748b)", fontSize: 10 }}>Seed-as-SQL. 11 rows. Only 1 used in OL (#142). Meta×Pinterest pairing undocumented (#140)</span>
          </div>
        </Card>
      </>}

      {/* Patterns */}
      {section === "patterns" && <>
        {[
          { id: 1, name: "Layer Skip (OL → CL)", count: "15+", desc: "IL layer was never built for many domains. CL absorbed IL responsibilities.", instances: "Client hierarchy (3), Google Sheets, Pinterest, Google Ads, TikTok Ads, Currency" },
          { id: 2, name: "graph.sources Dynamic Discovery", count: "All CL", desc: "Supermetrics creates one DL table per client. Pattern hides actual source list from dbt lineage.", instances: "IG (4), FB (3), TT (2), LI (3), Meta (7), Google (4), Pinterest (7)" },
          { id: 3, name: "total_ Prefix Inconsistency", count: "LinkedIn only", desc: "LinkedIn CL adds total_daily_* prefix. All other platforms don't. Causes manual aliasing in OL.", instances: "cl_linkedin_pages_* → il_linkedin_pages_* → OL remap" },
          { id: 6, name: "Missing dbt Configs", count: "29+ models", desc: "No materialization, tags, or unique_key. 23/37 CL models are views.", instances: "All Paid CL (23), 6 OL models, meta_attribution_windows" },
          { id: 7, name: "Materialization Absence", count: "23/37 CL", desc: "Only Organic CL (14) has table materialization. Ads CL runs as view including 30-source UNION ALL.", instances: "Meta (7), Google (4), Pinterest (7), Dims (2), Sheets (2), Currency (1)" },
          { id: 8, name: "clicks = link_clicks Double Output", count: "2 platforms", desc: "Google + Pinterest copy same source column to two output columns. Meta has separate sources.", instances: "cl_google_ads_ad_stats, cl_pinterest_pin_promotion_report" },
          { id: 9, name: "creative_type Classification Spread", count: "3 layers", desc: "Same concept classified in different layers per platform.", instances: "Meta=OL (CASE WHEN 20+), Pinterest=CL (CASE WHEN), Google=DL (API)" },
        ].map(p => (
          <Card key={p.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <span style={{ fontSize: 13, fontWeight: 700 }}>Pattern {p.id}: {p.name}</span>
              <Badge color="#6b21a8" bg="#f3e8ff">{p.count}</Badge>
            </div>
            <div style={{ fontSize: 12, color: "var(--color-text-secondary, #475569)", marginBottom: 4 }}>{p.desc}</div>
            <div style={{ fontSize: 11, color: "var(--color-text-tertiary, #94a3b8)" }}>Instances: {p.instances}</div>
          </Card>
        ))}
      </>}

      {/* Strategy */}
      {section === "strategy" && <>
        <Card>
          <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 4 }}>Rebuild Approach: Layer-by-Layer, Bottom-Up</div>
          <div style={{ fontSize: 11, color: "var(--color-text-secondary, #64748b)", marginBottom: 10 }}>Build each layer completely across all 4 platforms before moving to the next. This ensures interface consistency and avoids back-and-forth.</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {PHASES.map(p => {
              const layerColors = { il: "#3b82f6", stg: "#f59e0b", ol: "#8b5cf6", bl: "#059669", al: "#06b6d4", val: "#64748b" };
              const layerBg = { il: "#dbeafe40", stg: "#fef3c740", ol: "#ede9fe40", bl: "#dcfce740", al: "#cffafe40", val: "#f1f5f940" };
              return (
              <div key={p.phase} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 8,
                background: layerBg[p.layer], border: `1px solid ${layerColors[p.layer]}20`
              }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: layerColors[p.layer], display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 14, flexShrink: 0 }}>{p.phase}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{p.platform}</div>
                  <div style={{ fontSize: 11, color: "var(--color-text-secondary, #64748b)" }}>{p.why}</div>
                </div>
                <Badge color="#475569" bg="#f1f5f9">{p.models}</Badge>
                <Badge color="#059669" bg="#ecfdf5">{p.effort}</Badge>
              </div>
            )})}
          </div>
          <div style={{ marginTop: 10, fontSize: 11, color: "var(--color-text-tertiary, #94a3b8)" }}>
            Total estimate: ~5-6 weeks (target: end of June). Phase 2 (stg_OL) may be skipped if CL+IL merge is fully achievable in Phase 1. IL starts next week.
          </div>
        </Card>

        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Key Design Decisions</div>
          {[
            ["CL + IL merge?", "Merge into single 'new IL'. If not fully mergeable → stg_OL holds current IL logic"],
            ["Never-decrease location", "IL only (single location, per v3 pattern)"],
            ["Daily changes location", "OL only (consistent across platforms)"],
            ["LinkedIn v3 migration", "Migrate to v3 (consistency across platforms)"],
            ["Boosted mapping bridge", "Keep but fix hardcoded filters in ol_post_paid_metrics_totals_v3"],
          ].map(([q, a], i) => (
            <div key={i} style={{ display: "flex", gap: 8, padding: "6px 0", borderBottom: i < 4 ? "1px solid #f1f5f9" : "none", fontSize: 12 }}>
              <span style={{ fontWeight: 600, minWidth: 180, color: "var(--color-text-primary, #334155)" }}>{q}</span>
              <span style={{ color: "var(--color-text-secondary, #64748b)" }}>{a}</span>
            </div>
          ))}
        </Card>

        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Coordination with Aly (Paid Manager)</div>
          {[
            ["Now", "Timeline alignment. Ensure Paid rebuild doesn't break Organic dependencies"],
            ["Before Phase 5", "Schema contract for ol_post_paid_metrics_totals_v3 output"],
            ["Before Phase 5", "Agree on ol_clients / ol_client_projects / ol_platform_accounts ownership"],
            ["Phase 5-6", "Discuss if Attribution Layer (AL) should be joint responsibility"],
          ].map(([when, what], i) => (
            <div key={i} style={{ display: "flex", gap: 8, padding: "6px 0", borderBottom: i < 3 ? "1px solid #f1f5f9" : "none", fontSize: 12 }}>
              <Badge color="#7c3aed" bg="#f3e8ff">{when}</Badge>
              <span style={{ color: "var(--color-text-secondary, #64748b)" }}>{what}</span>
            </div>
          ))}
        </Card>

        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Target Architecture (2026 DWH)</div>
          <div style={{ fontSize: 11, color: "var(--color-text-secondary, #64748b)", marginBottom: 10, lineHeight: 1.5 }}>
            New IL = prev CL + IL merged (if mergeable). If not mergeable → <strong>stg_ol</strong> = current IL, and OL stays similar to current OL.
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", marginBottom: 4 }}>CURRENT</div>
              <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap" }}>
                {[["DL", "Sources"], ["CL", "37 models"], ["IL", "24 models"], ["OL", "16 models"], ["BL", "2 models"]].map(([l, d], i) => (
                  <div key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <div style={{ padding: "5px 10px", borderRadius: 6, background: "#f1f5f9", textAlign: "center", minWidth: 60 }}>
                      <div style={{ fontWeight: 800, fontSize: 13 }}>{l}</div>
                      <div style={{ fontSize: 9, color: "#64748b" }}>{d}</div>
                    </div>
                    {i < 4 && <span style={{ color: "#94a3b8", fontSize: 14 }}>→</span>}
                  </div>
                ))}
              </div>
            </div>
            <div style={{ borderTop: "1px dashed #d1d5db", paddingTop: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#059669", marginBottom: 4 }}>TARGET (2026)</div>
              <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap" }}>
                {[
                  ["DL", "Unified sources", "#f1f5f9"],
                  ["IL", "prev CL + IL\n(merged)", "#dbeafe"],
                  ["stg_OL", "prev IL\n(if not merged)", "#fef3c7"],
                  ["OL", "~same as\ncurrent OL", "#ede9fe"],
                  ["BL", "SPOT + aggr", "#dcfce7"],
                  ["AL", "Attribution\n(new)", "#dcfce7"],
                  ["RL", "Reporting\n(new)", "#dcfce7"]
                ].map(([l, d, bg], i) => (
                  <div key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <div style={{ padding: "5px 8px", borderRadius: 6, background: bg, textAlign: "center", minWidth: 60, border: (l === "AL" || l === "RL" || l === "stg_OL") ? "1px dashed #22c55e" : "none" }}>
                      <div style={{ fontWeight: 800, fontSize: l.length > 3 ? 11 : 13 }}>{l}</div>
                      <div style={{ fontSize: 8, color: "#64748b", whiteSpace: "pre-line" }}>{d}</div>
                    </div>
                    {i < 6 && <span style={{ color: "#94a3b8", fontSize: 14 }}>→</span>}
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 8, fontSize: 11, color: "var(--color-text-secondary, #64748b)", lineHeight: 1.5 }}>
                <strong>Option A (preferred):</strong> CL + IL merge into new IL → OL → BL → AL → RL<br/>
                <strong>Option B (fallback):</strong> CL + IL merge into new IL → stg_OL (=current IL logic) → OL → BL → AL → RL
              </div>
            </div>
          </div>
        </Card>
      </>}

      {/* Footer */}
      <div style={{ marginTop: 20, padding: "12px 0", borderTop: "1px solid var(--color-border-secondary, #e2e8f0)", fontSize: 11, color: "var(--color-text-tertiary, #94a3b8)", display: "flex", justifyContent: "space-between" }}>
        <span>Source: dbt CLI (2026-05-18) · 73 SQL files reviewed · Target: Architectural_plan.pdf</span>
        <span>Owner: Tara Hong</span>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
